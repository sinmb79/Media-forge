{
  "backends": {
    "comfyui": {
      "configured_paths": [
        "engines/comfyui",
        "%USERPROFILE%/ComfyUI",
        "%USERPROFILE%/workspace/ComfyUI",
        "C:/ComfyUI"
      ],
      "entry_file": "main.py",
      "install_guide_url": "https://github.com/comfyanonymous/ComfyUI"
    },
    "ffmpeg": {
      "configured_paths": [
        "engines/ffmpeg/bin/ffmpeg.exe",
        "%USERPROFILE%/ffmpeg/bin/ffmpeg.exe",
        "C:/ffmpeg/bin/ffmpeg.exe"
      ],
      "executables": [
        "ffmpeg"
      ],
      "version_args": [
        "-version"
      ],
      "install_guide_url": "https://ffmpeg.org/download.html"
    },
    "python": {
      "configured_paths": [
        "engines/python/python.exe"
      ],
      "executables": [
        "python",
        "python3",
        "py"
      ],
      "version_args": [
        "--version"
      ],
      "install_guide_url": "https://www.python.org/downloads/"
    },
    "ollama": {
      "configured_paths": [
        "engines/ollama/ollama.exe",
        "%LOCALAPPDATA%/Programs/Ollama/ollama.exe",
        "C:/Program Files/Ollama/ollama.exe"
      ],
      "executables": [
        "ollama"
      ],
      "version_args": [
        "--version"
      ],
      "install_guide_url": "https://ollama.com/download"
    },
    "edge-tts": {
      "executables": [
        "edge-tts"
      ],
      "version_args": [
        "--version"
      ],
      "install_guide_url": "https://github.com/rany2/edge-tts"
    },
    "propainter": {
      "configured_paths": [
        "engines/propainter",
        "%USERPROFILE%/ProPainter",
        "%USERPROFILE%/workspace/ProPainter"
      ],
      "entry_file": "inference_propainter.py",
      "install_guide_url": "https://github.com/sczhou/ProPainter"
    }
  }
}
